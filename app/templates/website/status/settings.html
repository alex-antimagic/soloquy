{% extends "layouts/base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('website.status_dashboard') }}">Status Page</a></li>
                    <li class="breadcrumb-item active">Settings</li>
                </ol>
            </nav>
            <h1><i class="bi bi-gear"></i> Status Page Settings</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <strong>Configuration</strong>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="is_enabled" name="is_enabled"
                                       {% if config.is_enabled %}checked{% endif %}>
                                <label class="form-check-label" for="is_enabled">
                                    <strong>Enable Status Page</strong>
                                    <small class="text-muted d-block">Make the status page publicly accessible</small>
                                </label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="page_title" class="form-label">Page Title</label>
                            <input type="text" class="form-control" id="page_title" name="page_title"
                                   value="{{ config.page_title }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="page_description" class="form-label">Page Description</label>
                            <textarea class="form-control" id="page_description" name="page_description"
                                      rows="3" required>{{ config.page_description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label for="support_url" class="form-label">Support URL (Optional)</label>
                            <input type="url" class="form-control" id="support_url" name="support_url"
                                   value="{{ config.support_url or '' }}"
                                   placeholder="https://support.example.com">
                            <small class="text-muted">Link to your support or help page</small>
                        </div>

                        <div class="mb-3">
                            <label for="show_incident_history_days" class="form-label">Incident History Days</label>
                            <input type="number" class="form-control" id="show_incident_history_days"
                                   name="show_incident_history_days" value="{{ config.show_incident_history_days }}"
                                   min="1" max="365" required>
                            <small class="text-muted">How many days of resolved incidents to display</small>
                        </div>

                        <button type="submit" class="btn btn-primary">Save Settings</button>
                        <a href="{{ url_for('website.status_dashboard') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <strong>Public URL</strong>
                </div>
                <div class="card-body">
                    <p class="mb-2">Your status page is available at:</p>
                    <div class="input-group">
                        <input type="text" class="form-control" readonly
                               value="{{ request.host_url }}w/{{ current_tenant.slug }}/status">
                        <button class="btn btn-outline-secondary" type="button"
                                onclick="navigator.clipboard.writeText('{{ request.host_url }}w/{{ current_tenant.slug }}/status')">
                            <i class="bi bi-clipboard"></i>
                        </button>
                    </div>
                    <a href="{{ url_for('public_bp.status_page', tenant_slug=current_tenant.slug) }}"
                       target="_blank" class="btn btn-sm btn-success mt-3 w-100">
                        <i class="bi bi-eye"></i> View Public Page
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
